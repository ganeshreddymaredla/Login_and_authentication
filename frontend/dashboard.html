<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexAuth — Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet" />
</head>
<body>

  <div class="bg-animation">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-brand">
      <i class="ri-shield-keyhole-fill"></i>
      <span>NexAuth</span>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">
        <i class="ri-moon-fill" id="themeIcon"></i>
      </button>
      <button class="logout-btn" onclick="logout()">
        <i class="ri-logout-box-r-line"></i>
        <span>Logout</span>
      </button>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main">

    <!-- Loading -->
    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <p>Loading your dashboard...</p>
    </div>

    <!-- Dashboard Content -->
    <div class="dashboard-content" id="dashboardContent" style="display:none">

      <!-- Welcome Banner -->
      <div class="welcome-banner" id="welcomeBanner">
        <div class="welcome-text">
          <div class="banner-badge" id="bannerBadge">👋 Welcome Back</div>
          <h1 class="welcome-name">Hello, <span id="userName">there</span> 👋</h1>
          <p class="welcome-desc">Here's your personal task board. Stay productive!</p>
        </div>
        <div class="welcome-avatar" id="userAvatar">?</div>
      </div>

      <!-- Stats Row -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon blue"><i class="ri-list-check-2"></i></div>
          <div class="stat-info">
            <span class="stat-label">Total Tasks</span>
            <span class="stat-value" id="statTotal">0</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green"><i class="ri-checkbox-circle-fill"></i></div>
          <div class="stat-info">
            <span class="stat-label">Completed</span>
            <span class="stat-value" id="statDone">0</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon orange"><i class="ri-time-line"></i></div>
          <div class="stat-info">
            <span class="stat-label">Pending</span>
            <span class="stat-value" id="statPending">0</span>
          </div>
        </div>
      </div>

      <!-- To-Do Card -->
      <div class="todo-card">
        <div class="todo-header">
          <h2><i class="ri-task-line"></i> My Tasks</h2>
          <!-- Filter Tabs -->
          <div class="filter-tabs">
            <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
            <button class="filter-btn" data-filter="pending" onclick="setFilter('pending')">Pending</button>
            <button class="filter-btn" data-filter="completed" onclick="setFilter('completed')">Completed</button>
          </div>
        </div>

        <!-- Add Task -->
        <div class="add-task-row">
          <div class="add-task-input-wrap">
            <i class="ri-add-circle-line"></i>
            <input
              type="text"
              id="taskInput"
              placeholder="Add a new task and press Enter..."
              maxlength="200"
              autocomplete="off"
            />
          </div>
          <button class="add-btn" id="addBtn" onclick="addTask()">
            <i class="ri-send-plane-fill"></i>
            <span>Add</span>
          </button>
        </div>
        <div class="task-error" id="taskError"></div>

        <!-- Task List -->
        <div class="task-list" id="taskList">
          <!-- tasks rendered here -->
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display:none">
          <i class="ri-inbox-2-line"></i>
          <p id="emptyMsg">No tasks yet. Add your first task above!</p>
        </div>

      </div><!-- end todo-card -->

    </div><!-- end dashboard-content -->
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
